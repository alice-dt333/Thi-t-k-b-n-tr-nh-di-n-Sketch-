<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dự án Portfolio Thực Tế</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="container">
            <div class="logo">WP Web Design</div>
            
            <nav class="nav-links">
                <a href="#">Trang chủ</a>
                <a href="#">Dự án</a>
                <a href="#">Blog</a>
                <a href="#">Liên hệ</a>
            </nav>

            <div class="hamburger-menu">&#9776;</div>
        </div>
    </header>

    <section class="hero-section">
        <div class="container">
            <div class="hero-content">
                <h1>Xin chào, tôi là Nhà thiết kế Web</h1>
                <p>Đây là đoạn văn ngắn giới thiệu về bản thân và các kỹ năng lập trình của tôi.</p>
                <button class="cta-btn">Xem dự án</button>
            </div>
            <img src="https://picsum.photos/id/26/400/300" alt="Ảnh cá nhân" class="hero-avatar">
        </div>
    </section>

    <main class="main-content">
        <div class="container">
            
            <div class="card">
                <div class="img-wrapper">
                    <img src="https://picsum.photos/id/119/400/250" alt="Dự án 1">
                </div>
                <h3>Tiêu đề Dự án 1</h3>
                <button>Đọc tiếp</button>
            </div>
            
            <div class="card">
                <div class="img-wrapper">
                    <img src="https://picsum.photos/id/180/400/250" alt="Dự án 2">
                </div>
                <h3>Tiêu đề Dự án 2</h3>
                <button>Đọc tiếp</button>
            </div>
            
            <div class="card">
                <div class="img-wrapper">
                    <img src="https://picsum.photos/id/201/400/250" alt="Dự án 3">
                </div>
                <h3>Tiêu đề Dự án 3</h3>
                <button>Đọc tiếp</button>
            </div>

        </div>
    </main>

</body>
</html>
